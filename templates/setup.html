<!DOCTYPE html>
<html>
<head>
    <title>Shoe Point - First Time Setup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .setup-card { background-color: #1e1e1e; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 500px; text-align: center; }
        .form-control { background: #2c2c2c; border: none; color: white; margin-bottom: 15px; padding: 12px; }
        .form-control:focus { background: #333; color: white; box-shadow: none; border: 1px solid #4CAF50; }
        .btn-setup { background: #4CAF50; color: white; font-weight: bold; width: 100%; padding: 12px; border-radius: 8px; border: none; transition: 0.3s; }
        .btn-setup:hover { background: #45a049; }
    </style>
</head>
<body>
    <div class="setup-card">
        <h2 class="mb-3">Welcome, Owner! 👋</h2>
        <p class="text-muted mb-4">This is the first time you are running Shoe Point.<br>Please set a secure password to protect your data.</p>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}<div class="alert alert-danger">{{ messages[0] }}</div>{% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3 text-start">
                <label class="form-label">New Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create Password" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm" class="form-control" placeholder="Repeat Password" required>
            </div>
            <button type="submit" class="btn btn-setup">Initialize System</button>
        </form>
    </div>
</body>
</html>
