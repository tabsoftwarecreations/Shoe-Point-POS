<!DOCTYPE html>
<html>
<head>
    <title>Shoe Point - UPI Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-center py-5">
    <div class="container">
        <div class="card shadow-lg p-5 mx-auto" style="max-width: 500px;">
            <h2 class="mb-4">Scan to Pay</h2>
            <h1 class="text-success mb-4">₹{{ amount }}</h1>
            
            <div class="mb-4">
                <img src="/static/qrcodes/{{ qr_url }}" class="img-fluid border p-2 bg-white" alt="UPI QR Code" style="width: 250px;">
            </div>
            
            <p class="text-muted">Waiting for payment confirmation...</p>
            <hr>
            
            <div class="d-grid gap-2">
                <form action="/confirm_upi_sale" method="POST">
                    <input type="hidden" name="batch_no" value="{{ batch_no }}">
                    <input type="hidden" name="amount" value="{{ amount }}">
                    <button type="submit" class="btn btn-success btn-lg w-100"> Payment Received</button>
                </form>

                <a href="/cancel_upi_sale" class="btn btn-outline-secondary"> Cancel Transaction</a>
            </div>
        </div>
    </div>
</body>
</html>
