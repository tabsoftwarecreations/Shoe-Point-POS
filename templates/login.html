<!DOCTYPE html>
<html>
<head>
    <title>Shoe Point Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background-color: #1e1e1e; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; }
        .logo { width: 150px; margin-bottom: 20px; filter: invert(1); }
        .form-control { background: #2c2c2c; border: none; color: white; margin-bottom: 15px; padding: 12px; }
        .form-control:focus { background: #333; color: white; box-shadow: none; border: 1px solid #4CAF50; }
        .btn-login { background: white; color: black; font-weight: bold; width: 100%; padding: 12px; border-radius: 8px; border: none; transition: 0.3s; }
        .btn-login:hover { background: #ddd; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="/static/Logo.png" class="logo">
        <h3 class="mb-4">Owner Access</h3>
        {% with messages = get_flashed_messages() %}
            {% if messages %}<div class="alert alert-danger">{{ messages[0] }}</div>{% endif %}
        {% endwith %}
        <form method="POST">
            <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
            <button type="submit" class="btn btn-login">UNLOCK SYSTEM</button>
        </form>
        <a href="/" class="d-block mt-3 text-muted text-decoration-none">Back to POS</a>
    </div>
</body>
</html>
